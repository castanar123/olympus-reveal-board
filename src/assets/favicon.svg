<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Night sky background -->
  <defs>
    <radialGradient id="nightSky" cx="30%" cy="30%">
      <stop offset="0%" style="stop-color:#2d1b69;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0a1a;stop-opacity:1" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" fill="url(#nightSky)"/>
  
  <!-- Cute stars scattered -->
  <circle cx="20" cy="15" r="2.5" fill="#e0d5ff" opacity="0.8" filter="url(#glow)"/>
  <circle cx="75" cy="20" r="1.8" fill="#c9b5ff" opacity="0.7"/>
  <circle cx="85" cy="60" r="2" fill="#d9ccff" opacity="0.75" filter="url(#glow)"/>
  
  <!-- Main cute star in center -->
  <g transform="translate(50, 50)" filter="url(#glow)">
    <!-- Star shape with rounded points -->
    <path d="M 0,-20 L 5.9,-6.2 L 20.5,-6.2 L 10.3,1.8 L 15.9,17.6 L 0,9.2 L -15.9,17.6 L -10.3,1.8 L -20.5,-6.2 L -5.9,-6.2 Z" 
          fill="#ffd700" opacity="0.95"/>
    <!-- Inner glow -->
    <circle cx="0" cy="-5" r="12" fill="#fff700" opacity="0.1"/>
  </g>
  
  <!-- Cute crescent moon accent -->
  <circle cx="75" cy="80" r="8" fill="url(#nightSky)"/>
  <circle cx="78" cy="78" r="8" fill="#f0e68c" opacity="0.6" filter="url(#glow)"/>
  
  <!-- CCS Night text indicator (small decorative element) -->
  <circle cx="25" cy="75" r="6" fill="#a78bfa" opacity="0.4" filter="url(#glow)"/>
</svg>